<svg xmlns="http://www.w3.org/2000/svg"
width="1280"
height="640"
viewBox="0 0 1280 640">

<style>
text {
    font-family: "JetBrains Mono", monospace;
}

.title {
    fill:#e5e7eb;
    font-size:20px;
}

.small {
    fill:#38bdf8;
    font-size:16px;
}

.border {
    fill:none;
    stroke:#22d3ee;
    stroke-width:2;
}

.panel {
    fill:#020617;
}

.line {
    stroke:#1e293b;
    stroke-width:1;
}


 

</style>

<!-- Background -->
<rect width="100%" height="100%" fill="#020617"/>

<defs>
    <clipPath id="portraitClip">
        <rect
            x="70"
            y="135"
            width="420"
            height="0">

            <animate
                attributeName="height"
                values="0;380;380;0"
                keyTimes="0;0.45;0.80;1"
                dur="6s"
                repeatCount="indefinite"/>

        </rect>
    </clipPath>
</defs>

<!-- Terminal -->
<rect x="40" y="40"
width="1200"
height="560"
rx="12"
class="panel"
stroke="#22d3ee"
stroke-width="2"/>

<!-- Top Bar -->
<rect
x="40"
y="40"
width="1200"
height="40"
fill="#0f172a"/>

<!-- Buttons -->
<circle cx="70" cy="60" r="7" fill="#ef4444"/>
<circle cx="95" cy="60" r="7" fill="#f59e0b"/>
<circle cx="120" cy="60" r="7" fill="#22c55e"/>

<!-- Title -->
<text
x="600"
y="65"
text-anchor="middle"
class="title">
mojammil@dev:~ ./profile.sh --live
</text>

<!-- Divider -->
<line
x1="40"
y1="80"
x2="1240"
y2="80"
class="line"/>

<!-- Left Panel -->

<text x="90" y="120" class="small">VISUAL.MAP</text>

<rect
x="70"
y="135"
width="420"
height="380"
rx="8"
fill="none"
stroke="#1d4ed8"
stroke-width="1"/>


